server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the UI
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy ollama.com search (for browsing available models)
    location /ollama-search {
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        proxy_pass https://ollama.com/search$is_args$args;
        proxy_set_header Host ollama.com;
        proxy_set_header Accept text/html;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    # Proxy ollama.com library (for model tag pages)
    location /ollama-library/ {
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        proxy_pass https://ollama.com/library/;
        proxy_set_header Host ollama.com;
        proxy_set_header Accept text/html;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }

    # Proxy Ollama API requests
    location /api/ {
        proxy_pass http://ollama:11434/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        # Support streaming responses
        chunked_transfer_encoding on;
    }
}
